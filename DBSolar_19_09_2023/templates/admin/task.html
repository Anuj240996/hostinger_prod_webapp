<div class="container mt-5">
   <h3 class="page-title text-center">Task Assigner</h3>
   <div class="card mt-3" style="border: 5px solid #573170; background-color: #f7f7f7;">
      <div class="card-body">
         <h2 class="card-title text-center" style="text-transform: uppercase; color:#573170;">Apply Now</h2>
         <br><br>
         <hr>
         <form method="post" style="background-color: #f7f7f7;">
            {% csrf_token %}
            <input type="hidden" name="task_type" id="task_type" value="complaint">
            <div class="row mb-3">
               <div class="col-sm-12">
                  <label class="col-form-label d-block"><b>Request Type:</b></label>
                  <div class="btn-group btn-group-toggle" data-toggle="buttons">
                     <label class="btn btn-primary active" id="complaintTypeLabel">
                        <input type="radio" name="task_type_toggle" value="complaint" autocomplete="off" checked> Complaints
                     </label>
                     <label class="btn btn-outline-primary" id="serviceTypeLabel">
                        <input type="radio" name="task_type_toggle" value="service" autocomplete="off"> Services
                     </label>
                  </div>
               </div>
            </div>
            <!-- Button to trigger the modal -->
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#profileModal">
            First Select Department
            </button>
            <div class="row mb-3">
               <div class="col-sm-6">
                  <label class="col-form-label">Department:</label>
                  <input type="text" name="Department" id="Department" readonly class="form-control" required>
               </div>
               <div class="col-sm-6">
                  <label for="AssignTo" class="col-form-label">Assign To:</label>
                  <input type="text" name="AssignTo" id="AssignTo" readonly class="form-control" required>
                  <input type="hidden" name="AssignToID" id="AssignToID">
               </div>
            </div>

<!--                     {% endfor %}-->
<!--                     {% else %}-->
<!--                     <option value="">No companies available</option>-->
<!--                     {% endif %}-->
<!--                  </select>-->

<!--                     &lt;!&ndash; Static Mic Icon (Visible initially) &ndash;&gt;-->

<!--                     <img src="{% static 'images/image1.png' %}" alt="Static Mic Icon" width="24" height="24">-->

             <div class="row mb-3">
                  <label class="col-sm-2 col-form-label">Company Name:</label>
                  <div class="col-sm-10 d-flex align-items-center">
                    <select id="comp_name" name="comp_name" class="form-control" style="width: 100%;" required>
                      <option value="">Select a company</option>
                      {% if companies %}
                      {% for company in companies %}
                      <option value="{{ company.Comp_name }}">{{ company.Comp_name }}</option>
                      {% endfor %}
                      {% else %}
                      <option value="">No companies available</option>
                      {% endif %}
                    </select>

                    <div id="voiceIconContainer" class="ml-2">
                      <span id="staticMicIcon" class="icon clickable" style="cursor: pointer;">
                        <img src="{% static 'images/image1.png' %}" alt="Static Mic Icon" width="24" height="24">
                      </span>
                    </div>
                  </div>
             </div>

            <div id="customer_details" style="display: none;">
               <div class="row mb-3">
                  <div class="col-sm-6">
                     <label for="phone" class="col-form-label">Phone:</label>
                     <input type="text" id="phone" name="phone" value="" readonly class="form-control">
                  </div>
                  <div class="col-sm-6">
                     <label for="address" class="col-form-label">Address:</label>
                     <input type="text" id="address" name="address" value="" readonly class="form-control">
                  </div>
               </div>
               <div class="row mb-3">
                  <div class="col-sm-6">
                     <label for="city" class="col-form-label">City:</label>
                     <input type="text" id="city" name="city" value="" readonly class="form-control">
                  </div>
                  <div class="col-sm-6">

               </div>
            </div>
            <div class="row">

<div class="modal fade" id="profileModal" tabindex="-1" aria-labelledby="profileModalLabel" aria-hidden="true">
   <div class="modal-dialog">
      <div class="modal-content">
         <div class="modal-header">
            <h5 class="modal-title" id="profileModalLabel">User Profile</h5>
            <button type="button" class="close" data-bs-dismiss="modal" data-dismiss="modal" onclick="closeProfileModal()" aria-label="Close"><span aria-hidden="true">&times;</span></button>
         </div>
         <div class="modal-body">
            <form method="post">
               {% csrf_token %}
               <div class="form-group">
                  <label for="department">Department</label>
                  <select class="form-control" id="department" name="department" required>
                     <!-- Add required attribute here -->
                     <option value="">Select Department</option>
                     {% for profile in unique_departments %}
                     <option value="{{ profile.department }}">{{ profile.department }}</option>
                     {% endfor %}
                  </select>
               </div>
               <div class="form-group">
                  <label for="first_name">First Name</label>
                  <select class="form-control" id="first_name" name="first_name">
                     <option value="">Select First Name</option>
                     {% for user in all_users %}
                     <option value="{{ user.id }}">{{ user.first_name }} {{ user.last_name }}</option>
                     {% endfor %}
                  </select>
               </div>
               <!-- Add more fields as needed -->
               <div class="modal-footer">
                  <button type="button" class="btn btn-primary">Save</button>
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-dismiss="modal" onclick="closeProfileModal()">Close</button>
                  <!--            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>-->
               </div>
            </form>
         </div>
      </div>
   </div>
</div>

<div class="modal fade" id="speechModal" tabindex="-1" aria-labelledby="speechModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="speechModalLabel">Speech Recognition</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center">
        <!-- Recognized Text -->
        <div id="recognizedText">
          <h3>Listening....</h3>
        </div>

        <!-- Dynamic Wave -->
        <div id="waveContainer" style="position: relative; width: 100%; height: 100px; overflow: hidden; border-radius: 10px;">
          <div id="wave" class="wave" style="position: absolute; width: 100%; height: 100%; background-color: lightgrey; border-radius: 5px;"></div>

          <!-- Position the mic image in the center of the wave -->
          <img id="micImage" src="{% static 'images/interview.gif' %}" alt="Mic Image" width="50" height="50" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script>
   document.addEventListener('DOMContentLoaded', function () {
     var hiddenType = document.getElementById('task_type');
     var complaintLabel = document.getElementById('complaintTypeLabel');
     var serviceLabel = document.getElementById('serviceTypeLabel');
     var complaintRadio = document.querySelector('input[name="task_type_toggle"][value="complaint"]');
     var serviceRadio = document.querySelector('input[name="task_type_toggle"][value="service"]');

     function setTaskType(type) {
       if (!hiddenType) return;
       var selected = (type === 'service') ? 'service' : 'complaint';
       hiddenType.value = selected;
       if (complaintRadio) complaintRadio.checked = selected === 'complaint';
       if (serviceRadio) serviceRadio.checked = selected === 'service';

       if (serviceLabel) {
         serviceLabel.classList.toggle('active', selected === 'service');
         serviceLabel.classList.toggle('btn-primary', selected === 'service');
         serviceLabel.classList.toggle('btn-outline-primary', selected !== 'service');
       }
       if (complaintLabel) {
         complaintLabel.classList.toggle('active', selected === 'complaint');
         complaintLabel.classList.toggle('btn-primary', selected === 'complaint');
         complaintLabel.classList.toggle('btn-outline-primary', selected !== 'complaint');
       }
     }

     if (complaintLabel) {
       complaintLabel.addEventListener('click', function (e) {
         e.preventDefault();
         setTaskType('complaint');
       });
     }
     if (serviceLabel) {
       serviceLabel.addEventListener('click', function (e) {
         e.preventDefault();
         setTaskType('service');
       });
     }
     if (complaintRadio) complaintRadio.addEventListener('change', function () { setTaskType('complaint'); });
     if (serviceRadio) serviceRadio.addEventListener('change', function () { setTaskType('service'); });

     setTaskType(hiddenType && hiddenType.value ? hiddenType.value : 'complaint');
   });

   function closeProfileModal() {
     var el = document.getElementById('profileModal');
     if (!el) return;
     // Prefer Bootstrap 5 API
     if (typeof bootstrap !== 'undefined' && bootstrap.Modal) {
       try {
         bootstrap.Modal.getOrCreateInstance(el).hide();
       } catch (e) {}
     }
     // Support Bootstrap 4/jQuery API if loaded
     if (window.jQuery && typeof jQuery.fn.modal === 'function') {
       try {
         jQuery(el).modal('hide');
       } catch (e) {}
     }
     // Manual cleanup for mixed Bootstrap environments
     el.classList.remove('show');
     el.style.display = 'none';
     el.setAttribute('aria-hidden', 'true');
     el.removeAttribute('aria-modal');
     document.body.classList.remove('modal-open');
     document.body.style.overflow = '';
     document.body.style.paddingRight = '';
     document.querySelectorAll('.modal-backdrop').forEach(function (b) { b.remove(); });
   }

   $(document).ready(function() {
     // Retrieve the dropdown elements
     var departmentDropdown = $('#department');
     var uniqueDepartmentDropdown = $('#unique_department');
     var firstNameDropdown = $('#first_name');
     var assignToTextbox = $('#AssignTo');
     var departmentTextbox = $('#Department');

     var assignToIDTextbox = $('#AssignToID');

     // Store the original options of the First Name dropdown
     var originalOptions = firstNameDropdown.html();

     // Update the AssignTo textbox and filter the First Name dropdown options when the modal's "Save" button is clicked
     $('#profileModal').on('click', '.btn-primary', function(event) {
       event.preventDefault();

       // Get the selected department and first name
       var selectedDepartment = departmentDropdown.val();
       var selectedFirstNameID = firstNameDropdown.find(':selected');


       // Ensure that a department is selected
       if (!selectedDepartment) {
         alert("Please select a department.");
         return;

       }


       // Ensure that a first name is selected
       if (!selectedFirstNameID.val()) {
         alert("Please select a first name.");
         return;
       }

       // Get the text and ID values from the selected option
       var selectedText = selectedFirstNameID.text();
       var selectedID = selectedFirstNameID.val();

       // Split the selectedText into first name and last name
       var splitNames = selectedText.split(' ');
       var firstName = splitNames[0];
       var lastName = splitNames[1];

       // Update the AssignTo and AssignToID textboxes with the selected values
       assignToTextbox.val(firstName + ' ' + lastName);
       assignToIDTextbox.val(selectedID);

       // Update the AssignTo and Department textboxes in the main form
       departmentTextbox.val(selectedDepartment);

      // Close the modal
      closeProfileModal();
     });

     // Define the options for departments and first names
     var departmentOptions = {
       {% for profile in all_profiles %}
       {% if profile.department %}
       '{{ profile.department }}': [
         {% for user in all_users %}
           {% if profile.department == user.profile.department %}
           {
             'id': '{{ user.id }}',
             'name': '{{ user.first_name }} {{ user.last_name }}'
           },
           {% endif %}
         {% endfor %}
       ],
       {% endif %}
       {% endfor %}
     };

     // Get unique department options
     var uniqueDepartments = Object.keys(departmentOptions);

     // Initialize the department dropdown with unique options
     $.each(uniqueDepartments, function(index, department) {
       departmentDropdown.append($('<option>', {
         value: department,
         text: department
       }));
     });

     // Initialize the unique_department dropdown with unique options
     $.each(uniqueDepartments, function(index, department) {
       uniqueDepartmentDropdown.append($('<option>', {
         value: department,
         text: department
       }));
     });


     // Initialize the first_name dropdown with the initial options
     updateFirstNameOptions();

     // Update the first_name dropdown when department changes
     departmentDropdown.change(function() {
       updateFirstNameOptions();
     });

     // Function to update the options of the first_name dropdown based on the selected department
     function updateFirstNameOptions() {
       var selectedDepartment = departmentDropdown.val();
       firstNameDropdown.empty(); // Clear the current options


       if (selectedDepartment) {
         var names = departmentOptions[selectedDepartment];

         // Add the options based on the selected department
         if (names.length > 0) {
           $.each(names, function(index, name) {
             firstNameDropdown.append($('<option>', {
               value: name.id,
               text: name.name
             }));
           });
         } else {
           firstNameDropdown.append($('<option>', {
             value: '',
             text: 'No names available'
           }));
         }
       } else {
         firstNameDropdown.append($('<option>', {
           value: '',
           text: '-- Select Name --'
         }));
       }
     }

     $('#comp_name').on('change', function() {
       var selectedCompany = $(this).val();
       if (selectedCompany !== '') {
         $.ajax({
           url: '/firereport/get_customer_details/',
           type: 'GET',
           data: { 'comp_name': selectedCompany },
           dataType: 'json',
           success: function(data) {
             if (data) {
               $('#phone').val(data.phone);
               $('#address').val(data.Address);
               $('#city').val(data.City);
               // $('#plant_capacity').val(data.Plant_Capacity);
               $('#plant_capacity').val(data.Plant_Capacity + " KW");
               $('#new_customer_id').val(data.new_customer_id); // Add the new field here
               // Update other fields as needed

               $('#customer_details').show();
             } else {
               // Clear the textbox values when no company is selected
               $('#phone').val('');
               $('#address').val('');
               $('#city').val('');
               $('#plant_capacity').val('');
               $('#new_customer_id').val(''); // Clear the new field
               // Clear other fields as needed

               $('#customer_details').hide();
             }
           }
         });
       }
     });


     // Handle form submission
     $('form').submit(function(event) {
       // Prevent the form from submitting
       event.preventDefault();

       // Get the selected values
       var selectedDepartment = departmentDropdown.val();
       var selectedFirstNameID = firstNameDropdown.val();

       // Perform any additional form validation or processing here

       // ...

       // Submit the form if necessary
       this.submit();
     });
   });

</script>

<script>
  $(document).ready(function () {
    const staticMicIcon = document.getElementById("staticMicIcon");
    const speechModal = new bootstrap.Modal(document.getElementById("speechModal"));
    const recognizedTextDiv = document.getElementById("recognizedText");
    const compNameDropdown = document.getElementById("comp_name");

    // Store the original dropdown options
    const originalOptions = Array.from(compNameDropdown.options).map(option => ({
      text: option.textContent.trim(),
      value: option.value
    }));

    // Initialize Fuse.js for fuzzy searching
    const fuse = new Fuse(originalOptions, {
      keys: ["text"],
      threshold: 0.3, // Adjust this based on how strict you want the search
      minMatchCharLength: 1,
      ignoreLocation: true,
      includeScore: true
    });

    // Initialize Speech Recognition
    let recognition;
    let isRecognitionRunning = false;
    if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
      recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'en-IN';
      recognition.interimResults = true;
    } else {
      console.error("Speech recognition not supported on this device.");
      return;
    }

    // Function to reset the dropdown list to the original options
    function resetDropdown() {
      compNameDropdown.innerHTML = '<option value="">Select a company</option>';
      originalOptions.forEach(option => {
        const opt = document.createElement("option");
        opt.value = option.value;
        opt.textContent = option.text;
        compNameDropdown.appendChild(opt);
        $('#customer_details').hide();
      });
    }

    // Function to normalize the text (removes special characters, lowercase)
    function normalizeText(text) {
      return text.toLowerCase().replace(/[^a-z0-9\s]/g, '');
    }

    // Function to filter options based on input
    function filterOptions(input) {
      const normalizedInput = normalizeText(input);
      let searchResults = [];

      // Check for complete match (exact match)
      const exactMatches = originalOptions.filter(option =>
        normalizeText(option.text) === normalizedInput
      );

      if (exactMatches.length > 0) {
        searchResults = exactMatches;
        alert(`Showing results for exact match: "${input}"`);
      } else {
        // Check for partial matches
        const partialSearchResults = fuse.search(normalizedInput);

        if (partialSearchResults.length > 0) {
          searchResults = partialSearchResults.map(result => result.item);
          alert(`Showing lists for ${searchResults.length} result(s) for: "${input}"`);
          
        } else {
          // Alert message for no matches found
          alert(`No matching company found for "${input}". Resetting to the default list.`);
          resetDropdown(); // Reset to the original dropdown list
          speechModal.hide();
          return;
        }
      }

      // Reset dropdown options
      compNameDropdown.innerHTML = '<option value="">Select a company</option>';

      if (searchResults.length > 0) {
        // Append search results to the dropdown
        searchResults.forEach(result => {
          const option = document.createElement("option");
          option.value = result.value;
          option.textContent = result.text;
          compNameDropdown.appendChild(option);
        });

        // If only one result is found, automatically select it
        if (searchResults.length === 1) {
          compNameDropdown.value = searchResults[0].value; // Select the single result
          $(compNameDropdown).trigger('change'); // Trigger change event
        }
      }
    }

    // Start recognition when modal opens
    staticMicIcon.addEventListener("click", function () {
      if (!isRecognitionRunning) {
        speechModal.show();
        recognizedTextDiv.innerHTML = "<h5>Listening...</h5>";
        recognition.start();
        isRecognitionRunning = true;
      }
    });

    // Handle recognition results
    recognition.onresult = function (event) {
      let interimTranscript = '';
      let finalTranscript = '';

      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript.trim();
        if (event.results[i].isFinal) {
          finalTranscript += transcript + ' ';
        } else {
          interimTranscript += transcript + ' ';
        }
      }

      recognizedTextDiv.innerHTML = `<h5>${finalTranscript || interimTranscript}</h5>`;

      if (finalTranscript) {
        setTimeout(function () {
          const input = finalTranscript.trim(); // Use the final transcript as input
          filterOptions(input); // Use the input in the search/filter function
          speechModal.hide(); // Hide the modal after filtering
        }, 200);
      }
    };

    // Handle errors during speech recognition
    recognition.onerror = function (event) {
      console.error("Speech recognition error:", event.error);
      recognizedTextDiv.textContent = "Error occurred. Please try again.";
      resetDropdown(); // Reset the dropdown on error
      speechModal.hide();
      if (isRecognitionRunning) {
        recognition.stop(); // Stop the recognition on error
        isRecognitionRunning = false;
      }
    };

    recognition.onend = function () {
      isRecognitionRunning = false;
    };
  });
</script>
