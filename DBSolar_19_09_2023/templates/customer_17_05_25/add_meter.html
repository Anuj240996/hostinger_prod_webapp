<style>
        .row {
            display: flex;
            align-items: center;
        }
        .row label {
            margin-right: 10px;
        }
    </style>
<script>

  let metersRowCounter = 0;

function addRow(containerId, counter) {
    const container = document.getElementById(containerId);
    const clone = container.querySelector(".row").cloneNode(true);

    // Get the current row index
    const currentIndex = counter;

    // Update input names in the cloned set
    const inputFields = clone.querySelectorAll("input[type='text']");
    inputFields.forEach(function (input) {
        const originalName = input.name;
        input.name = `${originalName}_${currentIndex}`;
        input.value = ''; // Clear the input values
    });

    container.appendChild(clone);
}

document.getElementById("addMetersRow").addEventListener("click", function () {
    metersRowCounter++;
    addRow("metersRow", metersRowCounter);
});
let meterTypeRowCounter = 0;
let generationMeterRowCounter = 0;
let generationCTRowCounter = 0;

function addMeterTypeRow() {
    meterTypeRowCounter++;
    addRow("meterTypeRow", meterTypeRowCounter);
}

function addGenerationMeterRow() {
    generationMeterRowCounter++;
    addRow("generationMeterRow", generationMeterRowCounter);
}

function addGenerationCTRow() {
    generationCTRowCounter++;
    addRow("generationCTRow", generationCTRowCounter);
}

document.getElementById("addMeterTypeRow").addEventListener("click", addMeterTypeRow);
document.getElementById("addGenerationMeterRow").addEventListener("click", addGenerationMeterRow);
document.getElementById("addGenerationCTRow").addEventListener("click", addGenerationCTRow);


</script>
