{% extends 'partials/base.html' %}
{% load static %}

{% block title %}No Access{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
  <div class="row">
    <div class="col-12 col-md-8 offset-md-2">
      <div class="card shadow">
        <div class="card-header bg-danger text-white">
          <h4 class="mb-0">Access not configured</h4>
        </div>
        <div class="card-body">
          <p>Your account does not currently have access to any dashboard/portal.</p>
          <p class="mb-0">Please contact an administrator to grant portal and module permissions.</p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
