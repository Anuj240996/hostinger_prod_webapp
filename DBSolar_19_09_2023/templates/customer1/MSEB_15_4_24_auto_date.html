<style>
    /* Set fixed width for Ok and Cancel columns */
    #mseb_table_body .ok-column,
    #mseb_table_body .cancel-column {
        width: 200px;
    }


    /* Change color of 'Done' to green */
    #mseb_table_body .status.done {
        color: green;
    }

    /* Change color of 'In Process' to yellow */
    #mseb_table_body .status.in-process {
        color: yellow;
    }
</style>

<style>
     /* Adjust table body row height */
    #mseb_table_body td,
    #mseb_table_body th {
        padding: 10px; /* Adjust padding to control row height */
    }

    /* Resize checkboxes */
    #mseb_table_body input[type="checkbox"] {
        width: 20px; /* Adjust width */
        height: 20px; /* Adjust height */
    }
</style>

<script>
    // Define fieldNames globally with their corresponding display names
    var fieldNames = {
        'load_extension': 'Load Extension',
        'flisibility': 'Off-Line Feasibility',
        'quotation': 'Firm Quotation Generation',
        'sent_to_bill': 'Sent to Bill',
        'net_meter': 'Net Metering Procedure',
        'flexibility': 'Technical Feasibility',
        'approval': 'Sanction/Approval',
        'meter_testing': 'Meter Testing',
        'agreement': 'Net Metering Agreement',
        'release': 'Meter Release',
        'installation_date': 'Meter Installation Date'
    };

    $(document).ready(function(){
        // Hide all rows except the first one initially
        $("tbody tr:not(:first)").hide();

        // Event listener for Comp_name dropdown change
         $("#fetchDataBtn").click(function() {
            var selectedCompId = $("#Comp_name").val();
            $("#compName").val(selectedCompId); // Set the selected company ID to hidden input field

            // AJAX request to fetch MSEB data for the selected company
            $.ajax({
                url: '/customer/get_mseb_data/',
                method: 'GET', // Use GET method to retrieve data
                data: {'comp_name': selectedCompId},
                dataType: 'json',
                success: function(response) {
                    console.log("Response:", response); // Log the response to inspect its structure
                    // Clear previous data
                    $("#mseb_table_body").empty();
                    var current_load = parseInt(response.current_load);
                    var loadsancution = parseInt(response.loadsancution);

                    if (response && response.error && response.error === "No data found for the selected company") {
                        // No data available for the selected company
                        console.log("No MSEB data available for the selected company");
                        if (current_load === loadsancution) {
                            // If they are equal, display all field names from 'net_meter' onwards
                            createNetMeterRow(); // Create the first row with "Load Extension" field
                        } else {
                            // If they are not equal, display all available field names
                            createLoadExtensionRow(); // Create the first row with "Load Extension" field
                        }
                    } else {
                        // Populate form fields with fetched data
                        var msebData = response;
                        var html = '';
                        var showNextRow = false;
                        for (var key in msebData) {
                            if (msebData.hasOwnProperty(key)) {
                                var fieldName = key.replace('_ok', ''); // Extract field name
                                var fieldValue = msebData[key].value; // Extract field value
                                var createdAt = msebData[key].created_at; // Extract created_at date

                                if (fieldValue) {
                                    html += '<tr>';
                                    html += '<td>' + fieldNames[fieldName] + '</td>';
                                    html += '<td class="status">Done</td>'; // Updated from "Ok" to "Done"
                                    html += '<td class="created-at">' + (createdAt ? createdAt : '') + '</td>';
                                    html += '<td><input type="checkbox" class="ok-checkbox" name="' + key + '" value="ok"' + (fieldValue ? ' checked' : '') + ' disabled></td>';
                                    html += '<td><input type="checkbox" class="cancel-checkbox" name="' + key.replace('_ok', '_cancel') + '" value="cancel" style="display: none;"></td>';
                                    html += '</tr>';
                                    showNextRow = true;
                                } else if (showNextRow) {
                                    html += '<tr>';
                                    html += '<td>' + fieldNames[fieldName] + '</td>';
                                    html += '<td class="status">In Process</td>'; // Updated from "Pending" to "In Process"
                                    html += '<td class="created-at">' + (createdAt ? createdAt : '') + '</td>'; // Display created_at date
                                    html += '<td><input type="checkbox" class="ok-checkbox" name="' + key + '" value="ok"></td>';
                                    html += '<td><input type="checkbox" class="cancel-checkbox" name="' + key.replace('_ok', '_cancel') + '" value="cancel"></td>';
                                    html += '</tr>';
                                    showNextRow = false; // Only show one In Process row after an unchecked Done row
                                }
                            }
                        }
                        $("#mseb_table_body").html(html);
                    }
                },
                error: function(xhr, errmsg, err) {
                    // Handle error
                    console.log("Error:", errmsg);
                }
            });
        });

        // Function to create the first row with "Load Extension" field
        function createLoadExtensionRow() {
            var html = '<tr>';
            html += '<td>' + fieldNames['load_extension'] + '</td>';
            html += '<td class="status"></td>';
            html += '<td class="created-at"></td>';
            html += '<td><input type="checkbox" class="ok-checkbox" name="load_extension_ok" value="ok"></td>';
            html += '<td><input type="checkbox" class="cancel-checkbox" name="load_extension_cancel" value="cancel"></td>';
            html += '</tr>';
            $("#mseb_table_body").html(html);
        }

        // Function to create the first row with "net_meter" field
        function createNetMeterRow() {
            var html = '<tr>';
            html += '<td>' + fieldNames['net_meter'] + '</td>';
            html += '<td class="status"></td>';
            html += '<td class="created-at"></td>';
            html += '<td><input type="checkbox" class="ok-checkbox" name="net_meter_ok" value="ok"></td>';
            html += '<td><input type="checkbox" class="cancel-checkbox" name="net_meter_cancel" value="cancel"></td>';
            html += '</tr>';
            $("#mseb_table_body").html(html);
        }

        // Event listener for Ok checkboxes change
        $(document).on('change', '.ok-checkbox', function(){
            var $this = $(this);
            var isChecked = $this.is(":checked");
            var $cancelCheckbox = $this.closest("tr").find(".cancel-checkbox");

            // Prompt confirmation dialog if OK checkbox is checked
            if (isChecked) {
                var confirmMessage = "Are you sure you want to save/update this record?";
                if (confirm(confirmMessage)) {
                    var compName = $("#Comp_name").val(); // Get the selected company name
                    var fieldName = $this.attr('name').replace('_ok', ''); // Extract field name
                    var createdAt = new Date().toLocaleString(); // Get current date and time

                    // Get CSRF token from the page
                    var csrfToken = $('input[name="csrfmiddlewaretoken"]').val();

                    // AJAX request to save the record in the database
                    $.ajax({
                        url: '/customer/MSEB/',
                        type: 'POST',
                        headers: {
                            'X-CSRFToken': csrfToken // Include CSRF token in headers
                        },
                        data: {
                            compName: compName,
                            fieldName: fieldName,
                            isChecked: isChecked,
                            createdAt: createdAt
                        },
                        success: function(response) {
                            console.log("Record saved successfully!");

                            // Change status and show next row if not last field name
                            $this.closest("tr").find(".status").text("Done"); // Updated from "Ok" to "Done"
                            $this.closest("tr").find(".created-at").text(createdAt);

                            // Get the current field index in the sequence
                            var currentIndex = Object.keys(fieldNames).indexOf(fieldName);

                            if (currentIndex < Object.keys(fieldNames).length - 1) {
                                // Get the next field name in the sequence
                                var nextFieldName = Object.keys(fieldNames)[currentIndex + 1];

                                // Find the next row with the next field name
                                var $nextRow = $this.closest("tr").nextAll().filter(function() {
                                    return $(this).find("td:first").text().trim() === fieldNames[nextFieldName];
                                }).first();

                                // Show the next row if found
                                if ($nextRow.length > 0) {
                                    $nextRow.show();
                                    // Change status to "In Process"
                                    $nextRow.find(".status").text("In Process");
                                } else {
                                    // If next row not found, create it
                                    createRowForFieldName(nextFieldName);
                                }

                                // Enable the next field
                                if ($nextRow.length > 0) {
                                    $nextRow.find('.ok-checkbox').prop('disabled', false);
                                }
                            }
                        },
                        error: function(xhr, errmsg, err) {
                            console.log("Error occurred while saving record:", errmsg);
                        }
                    });
                    // If confirmed, disable the OK checkbox and hide the Cancel checkbox
                    $this.prop("disabled", true);
                    $cancelCheckbox.hide();
                } else {
                    // If user cancels, uncheck the checkbox
                    $this.prop("checked", false);
                }
            }

            // Hide/show the cancel checkbox based on the checked state of the Ok checkbox
            if (isChecked) {
                $cancelCheckbox.prop("disabled", true).hide();
            } else {
                $cancelCheckbox.prop("disabled", false).show();
            }
        });

        // Function to create a row for a given field name
        function createRowForFieldName(fieldName) {
            var html = '<tr>';
            html += '<td>' + fieldNames[fieldName] + '</td>';
            html += '<td class="status">In Process</td>'; // Set status to "In Process"
            html += '<td class="created-at"></td>';
            html += '<td><input type="checkbox" class="ok-checkbox" name="' + fieldName + '_ok" value="ok"></td>';
            html += '<td><input type="checkbox" class="cancel-checkbox" name="' + fieldName + '_cancel" value="cancel"></td>';
            html += '</tr>';
            $("#mseb_table_body").append(html);
        }
    });
</script>

<form method="post">
    {% csrf_token %}

    <div class="col-md-12">
        <!-- general form elements -->
        <div class="card card-primary">
            <div class="card-header">
                <h3>Consumer MSEB Details</h3>
            </div>
            <br>
<!--           <div class="form-group row">-->
            <div class="d-flex align-items-end justify-content-center row">
                <div class="col-sm-9">
                    <label for="Comp_name"><b>Select Company Name:</b></label>
                    <select class="form-control" name="Comp_name" id="Comp_name" required>
                        <option value=""></option>
                        {% for comp_name in customers %}
                            <option value="{{ comp_name }}">{{ comp_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-sm-2">
                    <button type="button" id="fetchDataBtn">Fetch Data</button>
<!--                    <button type="button" id="preview"><i class="nav-icon fa fa-eye" aria-hidden="true"></i>   Preview</button>-->
                </div>
            </div>


            <br><br>

            <table border="1" id="mseb_table" style="display: none;" class="col-lg-11 text-center" align="center">
                <thead class="table-success">
                    <tr align="center">
                        <th>Phase</th>
                        <th>Status</th>
                        <th>Completion Date</th>
                        <th style="width: 130px; height: 50px;">Ok</th>
                        <th>Cancel</th>
                    </tr>
                </thead>
                <tbody id="mseb_table_body" align="center" style="width: 130px; height: 50px;">
                    <!-- Table rows will be populated dynamically -->
                </tbody>
            </table>
        </div>
    </div>
</form>

<script>
    $(document).ready(function() {
    $('#fetchDataBtn').click(function() {
        $('#mseb_table').toggle();
    });
});

</script>
