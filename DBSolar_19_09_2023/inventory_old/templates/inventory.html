     <form>
    <div style="border-bottom: 1px solid white;"></div>
       <div class="form-row">
      <!-- Dropdown for Stock Filtering -->
<!--      <div class="col-md-4 mb-2 item1">-->
      <div class="form-group col-md-2">
        <label for="stock-filter">Select Stock Filter:</label>
        <select id="stock-filter" class="form-control" name="stock_filter">
          <option value="all_1" hidden="">Choose Stock Filter</option>
          <option value="all">Select All</option>
          <option value="all_active">Active</option>
          <option value="all_inactive">Inactive</option>
          <option value="all_stock_alert">Stock Alert</option>
          <option value="select_all">Custom Filter</option>
          <option value="select_active">Custom Active</option>
          <option value="select_inactive">Custom Inactive</option>
          <option value="select_stock_alert">Custom Stock Alert</option>
        </select>
      </div>

      <!-- Category Dropdown (initially hidden based on stock filter) -->
      <div class="form-group col-md-5" id="category-container" style="display: none;">
        <label for="category">Select Category:</label>
        <select id="category" class="form-control" name="category">
          <option value="">-- Select Category --</option>
          {% for category in categories %}
            <option value="{{ category.id }}">{{ category.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Subcategory Dropdown (initially hidden based on stock filter) -->
      <div class="form-group col-md-5" id="subcategory-container" style="display: none;">
        <label for="subcategory">Select Subcategory:</label>
        <select id="subcategory" class="form-control" name="subcategory" disabled>
          <option value="">-- Select Subcategory --</option>
        </select>
      </div>
    </div>

    <div class="stock-table">
  <!-- Dynamic stock table heading -->
  <h4 id="stock-heading" align="center" style="color: blue;"></h4>
      <div class="table-responsive">
        <table id="yourDataTable" class="table table-hover table-center table.dataTable.table-sm mb-0 datatable table.sm" style="width: 100%;">
          <thead class="thead-dark align-middle">
            <tr class="text-center">
              <th style="width: 10%;">Sr No</th>
              <th style="width: 15%;">Category Name</th>
              <th style="width: 35%;">Stock Name</th>
              <th style="width: 15%;">Current Stock</th>
              <th style="width: 15%;">Status</th>
              <th style="width: 10%;">Action</th>
            </tr>
          </thead>
          <tbody id="stock-list">
            <!-- Stock values will be dynamically inserted here -->
          </tbody>
        </table>
      </div>
    </div>
  </form>

<script>
   let selectedStockFilter = ""; // Global variable to store the selected stock filter value

   document.getElementById('stock-filter').addEventListener('change', function() {
        const selectedOption = this.options[this.selectedIndex].text;  // Get the selected option's text
        const stockHeading = document.getElementById('stock-heading');

        // Update the global variable with the selected stock filter value
        selectedStockFilter = selectedOption;

        // Update the heading with the selected option text and the word "Stock"
        if (selectedOption !== "Choose Stock Filter") {
            stockHeading.textContent = `${selectedOption} Stock`;
        }

        // Change the background color of the dropdown based on the selected option
        const selectElement = document.getElementById('stock-filter');
        switch (selectedOption) {
            case 'All':
                selectElement.style.backgroundColor = 'lightgreen';
                break;
            case 'All Active':
                selectElement.style.backgroundColor = 'lightblue';
                break;
            case 'All Inactive':
                selectElement.style.backgroundColor = 'lightcoral';
                break;
            case 'All Stock Alert':
                selectElement.style.backgroundColor = 'yellow';
                break;
            case 'Select All':
                selectElement.style.backgroundColor = 'lightgray';
                break;
            case 'Select Active':
                selectElement.style.backgroundColor = 'lightcyan';
                break;
            case 'Select Inactive':
                selectElement.style.backgroundColor = 'lightpink';
                break;
            case 'Select Stock Alert':
                selectElement.style.backgroundColor = 'yellow';
                break;
            default:
                selectElement.style.backgroundColor = ''; // Default to no color
        }

        // Show or hide category and subcategory based on the selected filter
        const selectedValue = this.value;
        const categoryContainer = document.getElementById('category-container');
        const subcategoryContainer = document.getElementById('subcategory-container');

        if (selectedValue.startsWith('all')) {
            categoryContainer.style.display = 'none';
            subcategoryContainer.style.display = 'none';
        } else {
            categoryContainer.style.display = 'block';
            subcategoryContainer.style.display = 'block';
        }

        // Load stocks based on the selected filter
        loadStocks();
    });


   // Category change logic
  document.getElementById('category').addEventListener('change', function() {
    const categoryId = this.value;
    // Change the background color of the dropdown based on the selected option
    const selectElement = document.getElementById('category');
    if (categoryId) {
            selectElement.style.backgroundColor = '#d3dbec';
    }

    const subcategorySelect = document.getElementById('subcategory');
    subcategorySelect.innerHTML = '<option value="">-- Select Subcategory --</option>';
    subcategorySelect.disabled = true;

    if (categoryId) {
      fetch(`/inventory/get-subcategories/${categoryId}/`)
        .then(response => response.json())
        .then(data => {
          data.forEach(subcategory => {
            const option = document.createElement('option');
            option.value = subcategory.id;
            option.text = subcategory.name;
            subcategorySelect.appendChild(option);
          });
          subcategorySelect.disabled = false;
        });
    }
  });

  // Subcategory change logic
  document.getElementById('subcategory').addEventListener('change', function() {
    const subcategoryId = this.value;
    // Change the background color of the dropdown based on the selected option
    const selectElement = document.getElementById('subcategory');
    if (subcategoryId) {
            selectElement.style.backgroundColor = '#d3dbec';
    }


    loadStocks();
  });

  function loadStocks() {
      const stockFilter = document.getElementById('stock-filter').value;
      const categoryId = document.getElementById('category').value;
      const subcategoryId = document.getElementById('subcategory').value;
      const stockList = document.getElementById('stock-list');

      // Destroy the DataTable instance before loading new data
      const dataTableInstance = $('#yourDataTable').DataTable();
      dataTableInstance.clear().destroy();  // Clear the previous data and destroy the table instance

      stockList.innerHTML = ''; // Clear current stock list

      let url = `/inventory/get-stocks-all/${stockFilter}/`;  // Base URL with stock filter

      // Append category and subcategory to the URL if applicable
      if (stockFilter.startsWith('select')) {
          if (subcategoryId) {
              url = `/inventory/get-stocks/${stockFilter}/${subcategoryId}/`;
          } else if (categoryId) {
              url = `/inventory/get-stocks/${stockFilter}/category/${categoryId}/`;
          }
      }

      // Fetch stocks and update the table
      fetch(url)
          .then(response => response.json())
          .then(data => {
              data.forEach((stock, index) => {
                  const statusColor = stock.status ? 'green' : 'red';
                  const statusText = stock.status ? 'Active' : 'Inactive';
                  const editUrl = `/inventory/stock/${stock.id}/edit`;
                  const deleteUrl = `/inventory/stock/${stock.id}/delete`;

                  let quantityBackgroundColor = 'white';
                  let quantityTextColor = 'black';
                  if (stock.quantity <= stock.stock_alert) {
<!--                      quantityBackgroundColor = 'lightcoral';-->
                      quantityBackgroundColor = '#9c4500';
                      quantityTextColor = 'white';
                  }

                  const row = `
                      <tr>
                        <td class="text-center">${index + 1}</td>
                        <td class="text-center">${stock.category}/${stock.subcategory}</td>
                        <td>${stock.name}</td>
                        <td class="text-center">
                            <div class="quantity-cell" style="background-color: ${quantityBackgroundColor}; color: ${quantityTextColor}; padding: 0px; border-radius: 4px; display: inline-block; width: 100%;">
                                ${stock.quantity}
                                <span style="margin-left: 0px;"><small>${stock.purchase}</small></span>
                            </div>
                        </td>




                        <td class="text-center">
                          <span style="color: ${statusColor};" class="text-center">${statusText}</span>
                        </td>
                        <td class="text-center">
                          <div class="align-middle">
                            <a href="${editUrl}" style="color: #009ce7; font-size: 16px;">
                              <i class="fas fa-pen"></i>
                            </a>&nbsp;&nbsp;&nbsp;&nbsp;
                            <a href="${deleteUrl}" style="color: red; font-size: 16px;">
                              <i class="fas fa-trash"></i>
                            </a>
                          </div>
                        </td>
                      </tr>
                  `;
                  stockList.innerHTML += row;
              });

              // Reinitialize DataTable after inserting new rows
              $('#yourDataTable').DataTable({
                  paging: true,      // Enable pagination
                  searching: true,   // Enable search bar
                  ordering: true,    // Enable column ordering
                  info: true,        // Show table info
                  lengthChange: true // Allow users to change how many records are shown per page
              });
          });
  }



  // Initial load of stocks when the page loads
  loadStocks();
</script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>

        <script>
            function generatePDF() {
                const pdf = new jsPDF();
                pdf.autoTable({
                    html: '#yourDataTable'
                });
                pdf.save('table.pdf');
            }

            function generateExcel() {
                const table = $('#yourDataTable').DataTable();
                const header = [...getHeaderWithoutActions(table)];
                const filteredData = table.rows({
                    search: 'applied'
                }).data().toArray();
                const cleanData = filteredData.map((row, index) => {
                    const rowDataWithoutActions = row.filter((_, columnIndex) => !isActionColumn(table, columnIndex));
                    return [...rowDataWithoutActions.map(stripHtml)];
                });
                const data = [header, ...cleanData];

                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
                XLSX.writeFile(wb, 'table.xlsx');
            }


            function copyToClipboard() {
                const table = $('#yourDataTable').DataTable();
                const header = ['Sr No.', ...getHeaderWithoutActions(table)];
                const filteredData = table.rows({
                    search: 'applied'
                }).data().toArray();
                const cleanData = filteredData.map((row, index) => {
                    const rowDataWithoutActions = row.filter((_, columnIndex) => !isActionColumn(table, columnIndex));
                    return [index + 1, ...rowDataWithoutActions];
                });
                const data = [header, ...cleanData];

                // Convert the data to plain text (excluding HTML tags)
                const plainTextData = data.map(row => row.map(cell => stripHtml(cell)).join('\t')).join('\n');

                const plainText = document.createElement('textarea');
                plainText.textContent = plainTextData;
                document.body.appendChild(plainText);
                plainText.select();
                document.execCommand('copy');
                document.body.removeChild(plainText);
                alert('Filtered table copied to clipboard!');
            }

               // Function to strip HTML tags
                function stripHtml(html) {
                    let doc = new DOMParser().parseFromString(html, 'text/html');
                    return doc.body.textContent || "";
                }

                function printTable() {
                    const table = $('#yourDataTable').DataTable();

                    // Get the selected value from the Stock-filter dropdown
                    const selectedStock = $('#stock-filter').val();  // Assuming your dropdown has the id 'Stock-filter'

                    const header = [...getHeaderWithoutActions(table)];
                    const filteredData = table.rows({ search: 'applied' }).data().toArray();
                    const cleanData = filteredData.map((row) => {
                        const rowDataWithoutActions = row.filter((_, columnIndex) => !isActionColumn(table, columnIndex));
                        return [...rowDataWithoutActions];
                    });
                    const data = [header, ...cleanData];

                    const printWindow = window.open('', '_blank');
                    printWindow.document.open();
                    printWindow.document.write(`
                        <html>
                        <head>
                            <title>Filtered Table Print</title>
                            <style>
                                body {
                                    font-family: Arial, sans-serif;
                                    text-align: center;
                                }
                                table {
                                    width: 80%;
                                    margin: auto;
                                    border-collapse: collapse;

                                }
                                th, td {
                                    border: 1px solid black;
                                    padding: 8px;
                                    text-align: center;
                                }
                                th {
                                    background-color: #f2f2f2;
                                    font-weight: bold; /* Make table header bold */
                                    font-size: 14px; /* Set table body text size to 10 */
                                }
                                td {
                                    font-size: 12px; /* Set table body text size to 10 */
                                    color: black;
                                }
                                h1 {
                                    text-align: center;
                                }
                            </style>
                        </head>
                        <body>
                            <h1 class="page-heading">DB Solar Pvt Ltd. Ch.SambhajiNagar</h1>
                            <h3 class="page-heading" style="margin-top: -10px;">${selectedStockFilter} Stock</h3> <!-- Dynamically added Stock-filter value -->
                            <table style="margin-top: -10px; width: 100%;">
                                <thead>
                                    <tr>
                                        ${header.map(h => `<th>${h}</th>`).join('')}
                                    </tr>
                                </thead>
                                <tbody>
                                    ${cleanData.map(row =>
                                        '<tr>' + row.map((cell, index) => {
                                            // Assuming status is the last column
                                            if (index === row.length - 3) {
                                                return `<td style="text-align: left; padding-left: 20px;">${cell}</td>`;
                                            }
                                            if (index === row.length - 1) {
                                                return `<td style="color: black;">${cell}</td>`;
                                            }

                                            return `<td>${cell}</td>`;
                                        }).join('') + '</tr>'
                                    ).join('')}
                                </tbody>
                            </table>
                        </body>
                        </html>
                    `);
                    printWindow.document.close();
                    printWindow.print();
                }

                function getHeaderWithoutActions(table) {
                    return table.columns().header().toArray().map(th => th.innerText).filter(header => header !== 'Action' && header !== 'Sr No.');
                }

                function isActionColumn(table, columnIndex) {
                    const header = table.columns().header().toArray()[columnIndex].innerText;
                    return header === 'Action' || header === 'Sr No.';
                }
        </script>
