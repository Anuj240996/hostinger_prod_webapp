{% extends 'partials/base.html' %}

{% block title %} {{title}} {% endblock title %}


{% block content %}
                
    <form method="post">
        
        {% csrf_token %}
        
        <fieldset class="form-group">
            <div style="color:#575757; font-style: bold; font-size: 3rem; border-bottom: 1px solid white;">Delete Stock</div> <br>
            <h3 style="color:#575757;">Are you sure you want to delete the stock item "{{ object.name }}"?</h3>
        </fieldset>

        <div class="form-group">  
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'inventory' %}" class="btn btn-secondary">Cancel</a>
        </div>
        
    </form>

{% endblock content %}
