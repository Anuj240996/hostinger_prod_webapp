{% extends 'partials/base.html' %}
{% load static %}
{% block title %} New Purchase {% endblock title %}
{% block content %}
<br>
<div class="row" style="color: #4e4e4e; font-style: bold; font-size: 3rem;">
      <div  style="margin-left: 50px;"><h1>Customer Final Bills</h1></div>
       <!-- Add these buttons inside the col-auto div -->
                <div class="col-auto text-right float-right ml-auto" style="margin-right: 40px;">
                    <div class="dt-buttons btn-group flex-wrap">

                        <a href="{% url 'finalsales-list' %}" class="btn btn-primary" title="Create New Final DC"><i class="fas fa-reply"></i></a>
<!--                               <button class="btn btn-outline-primary mr-2" id="generate-pdf" href="{% url 'finalsales-list' %}"></i> Generate PDF</button>-->
<!--                              <button class="btn btn-outline-primary mr-2" id="generate-pdf" onclick="window.location.href='{% url 'finalsales-list' %}';">Generate PDF</button>-->
<a class="btn btn-outline-primary mr-2" id="generate-pdf" href="{% url 'finalsales-list' %}">
    Final DC List
</a>

<!--                               <button class="btn btn-outline-primary" id="generate-excel"><i class="fas fa-file-excel"></i> Generate Excel</button>-->
                    </div>
                </div>
    </div>

<div class="container mt-4">

    <!-- Dropdown to select customer -->
    <div class="form-group">
        <label for="customerSelect">Select Customer</label>
        <select id="customerSelect" class="form-control text-capitalize">
            <option value="" selected>Select a customer</option>
            {% for customer in customers %}
            <option value="{{ customer.Cust_id }}">{{ customer.Cust_id__Comp_name }}</option>-->
            {% endfor %}
        </select>
    </div>

    <!-- Table to display bills -->
    <div id="billsContainer" class="mt-4" style="display: none;">
        <h4>Bills</h4>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Select</th>
                    <th>Bill No</th>
                    <th>Time</th>
                    <th>Total Stock</th>
                </tr>
            </thead>
            <tbody id="billTableBody">
                <!-- Rows will be dynamically populated -->
            </tbody>
        </table>
        <button id="generateFinalBill" class="btn btn-primary" disabled>Generate Final Bill</button>
    </div>
</div>

    <div class="container mt-4">
        <!-- Final Bill Table -->
        <div id="finalBillContainer" class="mt-5" style="display: none;">
            <h4>Generated Final Bill</h4>
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Final Bill No</th>
                        <th>Customer</th>
                        <th>Stock</th>
                        <th>Quantity</th>
                        <th>Total Quantity</th>
<!--                        <th>Total Amount</th>-->
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="finalBillTableBody">
                    <!-- Final bill details will be dynamically added here -->
                </tbody>
                <!-- Return Button -->
            </table>
            <button id="returnButton" style="display: none;">Done</button>
        </div>
    </div>

<script>
    document.getElementById("customerSelect").addEventListener("change", function () {
        const customerId = this.value;
        if (customerId) {
            fetch(`/transactions/get-customer-bills/?customer_id=${customerId}`)
                .then(response => response.json())
                .then(data => {
                    const billTableBody = document.getElementById("billTableBody");
                    billTableBody.innerHTML = ""; // Clear existing rows
                    data.bills.forEach(bill => {
                        const row = `<tr>
                            <td><input type="checkbox" class="billCheckbox" data-bill-id="${bill.billno}" /></td>
                            <td>${bill.billno}</td>
                            <td>${bill.time}</td>
                            <td>${bill.total}</td>
                        </tr>`;
                        billTableBody.innerHTML += row;
                    });
                    document.getElementById("billsContainer").style.display = "block";
                });
        } else {
            document.getElementById("billsContainer").style.display = "none";
        }
    });

    document.getElementById("generateFinalBill").addEventListener("click", function () {
        const selectedBillIds = Array.from(document.querySelectorAll(".billCheckbox:checked")).map(checkbox => checkbox.dataset.billId);
        if (selectedBillIds.length > 0) {
            fetch(`/transactions/generate-final-bill/`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify({ bill_ids: selectedBillIds })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Show the final bill table
                    const finalBillContainer = document.getElementById("finalBillContainer");
                    finalBillContainer.style.display = "block";

                    // Add the new final bill to the table
                    const finalBillTableBody = document.getElementById("finalBillTableBody");
                    finalBillTableBody.innerHTML = ""; // Clear previous data

                    const stockDetails = data.final_bill.stock_details;
                    let firstRow = `
                        <tr>
                            <td rowspan="${stockDetails.length}">${data.final_bill.billno}</td>
                            <td rowspan="${stockDetails.length}" class="text-capitalize">${data.final_bill.customer_name}</td>
                    `;
                    stockDetails.forEach((stock, index) => {
                        if (index === 0) {
                            // Add stock and quantity in the same row as the main data
                            firstRow += `
                                <td>${index + 1}. ${stock.name}</td>
                                <td>${stock.quantity}</td>
                                <td rowspan="${stockDetails.length}">${data.final_bill.total_quantity}</td>
<!--                                <td rowspan="${stockDetails.length}">${data.final_bill.total_amount}</td>-->
                                <td rowspan="${stockDetails.length}">${data.final_bill.time}</td>
                            </tr>
                            `;
                            finalBillTableBody.innerHTML += firstRow;

                            // Show the return button
                            const returnButton = document.getElementById("returnButton");
                            returnButton.style.display = "block";
                            returnButton.addEventListener("click", function () {
                                window.location.href = "/transactions/finalsales/"; // Replace with your final sales list URL
                            });
                        } else {
                            // Add additional rows for the remaining stock and quantity
                            finalBillTableBody.innerHTML += `
                                <tr>
                                    <td>${index + 1}. ${stock.name}</td>
                                    <td>${stock.quantity}</td>
                                </tr>
                            `;
                        }
                    });

                    // Display success message
                    alert("Final Bill Created Successfully!");
                } else {
                    alert("Failed to create the final bill. Try again.");
                }
            });
        } else {
            alert("Please select at least one bill.");
        }
    });


    document.getElementById("billTableBody").addEventListener("change", function () {
        const checkboxes = document.querySelectorAll(".billCheckbox:checked");
        document.getElementById("generateFinalBill").disabled = checkboxes.length === 0;
    });

</script>
{% endblock %}
