<style>
  .Checkbox-input {
    margin-right: 10px;
    transform: scale(1.2);
  }
  .form-check {
    display: flex;
    align-items: center;
  }
  .form-check label {
    margin-bottom: 0;
  }
</style>
<style>
  .form-check input[type="checkbox"] {
    accent-color: green; /* For modern browsers */
    width: 20px;
    height: 20px;
    margin-right: 8px;
    cursor: pointer;
  }

  /* Optional: For legacy browsers or more custom styling */
  .form-check input[type="checkbox"]:checked + label {
    background-color: #28a745;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
  }

  .form-check label {
    cursor: pointer;
    transition: background-color 0.3s, color 0.3s;
  }

  .form-check {
    display: flex;
    align-items: center;
    gap: 8px;
  }
</style>

          <input type="radio" name="filter_type" value="customer" id="filterCustomer" checked autocomplete="off">
          <b> Consumer</b>
        </label>
        <label class="btn btn-outline-success" id="vendorLabel">
          <input type="radio" name="filter_type" value="vendor" id="filterVendor" autocomplete="off">
          <b> Vendor</b>
        </label>
      </div>
    </div>

    <fieldset>
      <!-- Consumer Row -->
      <div class="row mb-3" id="consumerRow" style="display: flex; gap: 5px;">
        <div class="col" id="customerTypeContainer">
          <label><b>Consumer Type</b></label>
          <select id="customerTypeDropdown" class="form-control">
            <option value="">-- Select Type --</option>
            {% for customer_type in customer_types %}
              <option value="{{ customer_type }}">{{ customer_type }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col" id="customerContainer" style="display: none;">
          <label><b>Select Consumer</b></label>
          <select id="customerDropdown" class="form-control" disabled>
            <option value="">-- Select Consumer --</option>
          </select>
        </div>
        <div class="col" id="customerBillContainer" style="display: none;">
          <label><b>Select Bill</b></label>
          <select id="billDropdown" class="form-control" disabled>
            <option value="">-- Select Bill --</option>
          </select>
        </div>
      </div>

      <!-- Vendor Row -->
      <div class="row mb-3" id="vendorRow" style="display: none; gap: 5px;">
        <div class="col" id="vendorTypeContainer">
          <label><b>Vendor Type</b></label>
          <select id="vendorTypeDropdown" class="form-control">
            <option value="">-- Select Type --</option>
            {% for vendor_type in vendor_types %}
              <option value="{{ vendor_type }}">{{ vendor_type }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col" id="vendorContainer" style="display: none;">
          <label><b>Select Vendor</b></label>
          <select id="vendorDropdown" class="form-control" disabled>
            <option value="">-- Select Vendor --</option>
          </select>
        </div>
        <div class="col" id="vendorBillContainer" style="display: none;">
          <label><b>Select Bill</b></label>
          <select id="vendorBillDropdown" class="form-control" disabled>
            <option value="">-- Select Bill --</option>
          </select>
        </div>
      </div>

      <!-- Category Checkboxes -->
      <div class="form-group mt-3" id="categoryGroup" style="display: none;">
        <label><b>Select Categories</b></label>
        <div id="categoryDropdown" class="checkbox-group"></div>
      </div>
    </fieldset>

    <!-- Next Button (Initially Hidden) -->
<!--    <button type="submit" id="Next" class="btn btn-primary mt-4" style="display: none;">Next</button>-->
      <!-- Next Button -->
    <div class="d-flex justify-content-center mt-4">
      <button type="submit" id="Next" class="btn btn-primary btn-lg px-5 py-2" style="display: none;">Next</button>
    </div>

  </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const customerTypeDropdown = document.getElementById('customerTypeDropdown');
  const customerDropdown = document.getElementById('customerDropdown');
  const billDropdown = document.getElementById('billDropdown');
  const customerContainer = document.getElementById('customerContainer');
  const customerBillContainer = document.getElementById('customerBillContainer');

  const vendorTypeDropdown = document.getElementById('vendorTypeDropdown');
  const vendorDropdown = document.getElementById('vendorDropdown');
  const vendorBillDropdown = document.getElementById('vendorBillDropdown');
  const vendorContainer = document.getElementById('vendorContainer');
  const vendorBillContainer = document.getElementById('vendorBillContainer');

  const consumerRow = document.getElementById('consumerRow');
  const vendorRow = document.getElementById('vendorRow');

  const categoryDropdown = document.getElementById('categoryDropdown');
  const categoryGroup = document.getElementById('categoryGroup');
  const nextButton = document.getElementById('Next');

  const customerLabel = document.getElementById('customerLabel');
  const vendorLabel = document.getElementById('vendorLabel');
  const filterCustomer = document.getElementById('filterCustomer');
  const filterVendor = document.getElementById('filterVendor');

  function resetCategories() {
    categoryDropdown.innerHTML = '';
    categoryGroup.style.display = 'none';
    nextButton.style.display = 'none';
  }

  function resetAll() {
    customerTypeDropdown.value = "";
    customerDropdown.innerHTML = '<option value="">-- Select Consumer --</option>';
    billDropdown.innerHTML = '<option value="">-- Select Bill --</option>';
    vendorTypeDropdown.value = "";
    vendorDropdown.innerHTML = '<option value="">-- Select Vendor --</option>';
    vendorBillDropdown.innerHTML = '<option value="">-- Select Bill --</option>';
    customerContainer.style.display = 'none';
    customerBillContainer.style.display = 'none';
    vendorContainer.style.display = 'none';
    vendorBillContainer.style.display = 'none';
    resetCategories();
  }

  function updateEntityDisplay(selected) {
    resetAll();

    if (selected === 'customer') {
      consumerRow.style.display = 'flex';
      vendorRow.style.display = 'none';
      customerLabel.classList.add('active');
      vendorLabel.classList.remove('active');
    } else {
      vendorRow.style.display = 'flex';
      consumerRow.style.display = 'none';
      vendorLabel.classList.add('active');
      customerLabel.classList.remove('active');
    }
  }

  // ✅ Add explicit click handlers for radio labels
  customerLabel.addEventListener('click', function () {
    filterCustomer.checked = true;
    updateEntityDisplay('customer');
  });

  vendorLabel.addEventListener('click', function () {
    filterVendor.checked = true;
    updateEntityDisplay('vendor');
  });

  // Default state
  updateEntityDisplay('customer');

  // ---------------- Customer logic ----------------
  customerTypeDropdown.addEventListener('change', () => {
    const type = customerTypeDropdown.value;
    customerDropdown.innerHTML = '<option value="">-- Select Consumer --</option>';
    customerDropdown.disabled = true;
    customerContainer.style.display = 'none';
    customerBillContainer.style.display = 'none';
    resetCategories();

    if (type) {
      fetch(`/transactions/get_customers_by_type/${type}/`)
        .then(res => res.json())
        .then(data => {
          data.customers.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.Cust_id;
            opt.textContent = c.Comp_name;
            customerDropdown.appendChild(opt);
          });
          customerDropdown.disabled = false;
          customerContainer.style.display = 'block';
        });
    }
  });

  customerDropdown.addEventListener('change', () => {
    const id = customerDropdown.value;
    billDropdown.innerHTML = '<option value="">-- Select Bill --</option>';
    billDropdown.disabled = true;
    customerBillContainer.style.display = 'none';
    resetCategories();

    if (id) {
      fetch(`/transactions/get_billnos/${id}/`)
        .then(res => res.json())
        .then(data => {
          data.bills.forEach(b => {
            const opt = document.createElement('option');
            opt.value = b.billno;
            opt.textContent = b.billno;
            billDropdown.appendChild(opt);
          });
          billDropdown.disabled = false;
          customerBillContainer.style.display = 'block';
        });
    }
  });

  // ---------------- Vendor logic ----------------
  vendorTypeDropdown.addEventListener('change', () => {
    const type = vendorTypeDropdown.value;
    vendorDropdown.innerHTML = '<option value="">-- Select Vendor --</option>';
    vendorDropdown.disabled = true;
    vendorContainer.style.display = 'none';
    vendorBillContainer.style.display = 'none';
    resetCategories();

    if (type) {
      fetch(`/transactions/get_vendor_by_type/${type}/`)
        .then(res => res.json())
        .then(data => {
          data.vendor.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.id;
            opt.textContent = v.name;
            vendorDropdown.appendChild(opt);
          });
          vendorDropdown.disabled = false;
          vendorContainer.style.display = 'block';
        });
    }
  });

  vendorDropdown.addEventListener('change', () => {
    const id = vendorDropdown.value;
    vendorBillDropdown.innerHTML = '<option value="">-- Select Bill --</option>';
    vendorBillDropdown.disabled = true;
    vendorBillContainer.style.display = 'none';
    resetCategories();

    if (id) {
      fetch(`/transactions/get_vendor_billnos/${id}/`)
        .then(res => res.json())
        .then(data => {
          data.bills.forEach(b => {
            const opt = document.createElement('option');
            opt.value = b.billno;
            opt.textContent = b.billno;
            vendorBillDropdown.appendChild(opt);
          });
          vendorBillDropdown.disabled = false;
          vendorBillContainer.style.display = 'block';
        });
    }
  });

  // ---------------- Common category logic ----------------
  function handleBillChange(billDropdown) {
    const billno = billDropdown.value;
    resetCategories();

    if (billno) {
      categoryDropdown.innerHTML = '<div>Loading categories...</div>';
      fetch(`/transactions/get_categories_by_billno/${billno}/`)
        .then(res => res.json())
        .then(data => {
          categoryDropdown.innerHTML = '';
          if (data.categories.length > 0) {
            data.categories.forEach(cat => {
              categoryDropdown.innerHTML += `
                <div class="form-check mb-2">
                  <input type="checkbox" class="checkbox-input category-checkbox" value="${cat.id}" id="cat_${cat.id}">
                  <label for="cat_${cat.id}" class="mb-0">${cat.name}</label>
                </div>`;
            });
            categoryGroup.style.display = 'block';
            watchCategoryCheckboxes();
          } else {
            categoryDropdown.innerHTML = '<div>No categories available</div>';
            categoryGroup.style.display = 'block';
          }
        });
    }
  }

  billDropdown.addEventListener('change', () => handleBillChange(billDropdown));
  vendorBillDropdown.addEventListener('change', () => handleBillChange(vendorBillDropdown));

  function watchCategoryCheckboxes() {
    const checkboxes = document.querySelectorAll('.category-checkbox');
    checkboxes.forEach(cb => {
      cb.addEventListener('change', () => {
        const atLeastOneChecked = Array.from(checkboxes).some(c => c.checked);
        nextButton.style.display = atLeastOneChecked ? 'inline-block' : 'none';
      });
    });
  }

  // ---------------- Form submit ----------------
  document.getElementById('returnForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const selected = filterCustomer.checked ? 'customer' : 'vendor';
    const selectedBill = (selected === 'customer' ? billDropdown : vendorBillDropdown).value;
    const categories = Array.from(document.querySelectorAll('.category-checkbox:checked')).map(c => c.value);
    const params = new URLSearchParams();
    params.append('categories', categories.join(','));

    if (selected === 'customer') {
      params.append('customer_type', customerTypeDropdown.value);
      params.append('customer', customerDropdown.value);
    } else {
      params.append('vendor', vendorDropdown.value);
    }

    window.location.href = `/transactions/return/finalsales_return/${selectedBill}/?${params.toString()}`;
  });
});
</script>
