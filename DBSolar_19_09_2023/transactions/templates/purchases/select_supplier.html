{% extends 'partials/base.html' %}
{% block title %} New Purchase {% endblock title %}
{% block content %}


    <div style="color:#575757; font-style: bold; font-size: 3rem; border-bottom: 1px solid white;">New Purchase</div>
    <br>
    <form method="post" id="purchaseForm">
        {% csrf_token %}

        <!-- Category Dropdown -->
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" class="form-control text-capitalize" name="category">
                <option value="">--Select Category--</option>
                {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Supplier Dropdown (Initially hidden) -->
        <div class="form-group" id="supplierDropdown" style="display:none;">
            <label for="supplier">Supplier</label>
            <select id="supplier" class="form-control text-capitalize" name="supplier">
                <option value="">--Select Supplier--</option>
            </select>
        </div>

        <br>
        <div class="align-middle">
            <button type="submit" class="btn btn-success">Next</button>
            <a href="{% url 'purchases-list' %}" class="btn btn-secondary">Cancel</a>
        </div>

    </form>

    <script>
        // When category is selected, show supplier dropdown and fetch related suppliers
        document.getElementById('category').addEventListener('change', function() {
            let categoryId = this.value;
            if (categoryId) {
                // Show the supplier dropdown
                document.getElementById('supplierDropdown').style.display = 'block';

                // Fetch suppliers based on category
                fetch(`/transactions/get-suppliers/${categoryId}/`)
                .then(response => response.json())
                .then(data => {
                    let supplierSelect = document.getElementById('supplier');
                    supplierSelect.innerHTML = '<option value="">--Select Supplier--</option>';  // Reset supplier options
                    data.suppliers.forEach(supplier => {
                        supplierSelect.innerHTML += `<option value="${supplier.id}">${supplier.name}</option>`;
                    });
                });
            } else {
                // Hide the supplier dropdown if no category is selected
                document.getElementById('supplierDropdown').style.display = 'none';
            }
        });
    </script>

{% endblock content %}
